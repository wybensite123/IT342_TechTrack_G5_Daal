# ===============================
# APPLICATION
# ===============================
spring.application.name=techtrack-backend
server.port=8080

# ===============================
# POSTGRESQL — Supabase
# ===============================
# Direct database connection to avoid pgbouncer pooler limits.
spring.datasource.url=jdbc:postgresql://db.bicgrfraxlqeklfmlwab.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Wybendaal123
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=TechTrackHikariPool

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ===============================
# JWT
# ===============================
jwt.secret=TechTrackG5DaalDevSecretKey2025SecureEnoughForDev
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ===============================
# FILE UPLOAD
# ===============================
upload.dir=./uploads/assets
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
